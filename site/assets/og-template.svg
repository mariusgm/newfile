<!-- NewFile OG card · 1200×630.
     Dark canvas, icon on left third, wordmark + tagline cream on right,
     newfile.dev mark orange bottom-right. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif">
  <!-- canvas -->
  <rect width="1200" height="630" fill="#1C1714"/>

  <!-- app icon at (90, 135), 360×360 -->
  <g transform="translate(90, 135) scale(0.3515625)">
    <rect width="1024" height="1024" rx="200" fill="#1C1714"/>
    <mask id="ogframe">
      <rect width="1024" height="1024" fill="#fff"/>
      <rect x="192" y="155" width="640" height="714" rx="37" fill="#000"/>
    </mask>
    <rect x="144" y="107" width="736" height="810" rx="74" fill="#FAF7F2" mask="url(#ogframe)"/>
    <g fill="#FF7849">
      <rect x="256" y="205" width="28.125" height="101.25"/>
      <rect x="230.6875" y="205" width="78.75" height="16.875"/>
      <rect x="230.6875" y="289.375" width="78.75" height="16.875"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="510" y="285" fill="#FAF7F2" font-size="92" font-weight="700"
        letter-spacing="-2">NewFile</text>

  <!-- tagline (cream at 75% opacity rendered as a flat color) -->
  <text x="510" y="345" fill="#BCB8B0" font-size="34" font-weight="400">The New File button macOS forgot.</text>

  <!-- newfile.dev mark, bottom-right -->
  <text x="1140" y="585" fill="#FF7849" font-size="28" font-weight="600"
        text-anchor="end">newfile.dev</text>
</svg>
