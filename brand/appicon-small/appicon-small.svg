<!-- Small-size AppIcon variant: bolder mark for legibility at 16/32px.
     Inverted treatment to match master: dark warm squircle (#1C1714),
     light cream frame (#FAF7F2), orange cursor (#FF6B35).
     Uses stacked filled rects (outer light + inner dark) instead of strokes
     since strokes get crushed by antialiasing at sub-32px renderings. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1C1714"/>
  <rect x="7" y="4" width="18" height="24" rx="2" fill="#FAF7F2"/>
  <rect x="9" y="6" width="14" height="20" rx="1" fill="#1C1714"/>
  <rect x="15" y="11" width="2" height="10" fill="#FF6B35"/>
  <rect x="13" y="11" width="6" height="1" fill="#FF6B35"/>
  <rect x="13" y="20" width="6" height="1" fill="#FF6B35"/>
</svg>
