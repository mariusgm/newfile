<!-- Direction (a) control: pure rect frame, no detail — baseline for comparison -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <mask id="m">
    <rect width="64" height="64" fill="#000"/>
    <rect x="12" y="10" width="40" height="44" rx="4" fill="#fff"/>
    <rect x="16" y="14" width="32" height="36" rx="2" fill="#000"/>
  </mask>
  <rect width="64" height="64" fill="currentColor" mask="url(#m)"/>
</svg>
