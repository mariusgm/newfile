  <mask id="m">
    <rect width="64" height="64" fill="#000"/>
    <rect x="14" y="10" width="36" height="44" rx="4" fill="#fff"/>
    <rect x="38" y="16" width="3" height="11" rx="1" fill="#000"/>
    <rect x="34" y="20" width="11" height="3" rx="1" fill="#000"/>
  </mask>
  <rect width="64" height="64" fill="currentColor" mask="url(#m)"/>
</svg>
